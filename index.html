<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xrex Zob - Official</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #0c0c0c 0%, #1a1a2e 50%, #16213e 100%);
            color: #fff;
            overflow-x: hidden;
            min-height: 100vh;
        }
        .container { max-width: 1200px; padding: 0 20px; margin: 0 auto; }

        /* Header */
        header {
            position: fixed; top: 0; width: 100%; background: rgba(0,0,0,0.95);
            backdrop-filter: blur(10px); z-index: 1000; padding: 15px 0;
        }
        .logo {
            font-family: 'Orbitron', monospace; font-size: 24px; font-weight: 900;
            background: linear-gradient(45deg, #00f5ff, #ff00ff, #00ff88);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-align: center;
        }
        nav { display: flex; justify-content: center; gap: 15px; margin-top: 10px; }
        .nav-btn {
            background: rgba(255,255,255,0.1); border: 1px solid rgba(0,245,255,0.3);
            color: #00f5ff; padding: 8px 16px; border-radius: 25px; text-decoration: none; font-size: 14px;
        }

        /* Hero */
        .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .hero h1 {
            font-family: 'Orbitron', monospace; font-size: clamp(32px, 8vw, 48px);
            background: linear-gradient(45deg, #00f5ff, #ff00ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: glow 2s ease-in-out infinite alternate;
        }
        @keyframes glow { from { filter: drop-shadow(0 0 10px #00f5ff); } to { filter: drop-shadow(0 0 20px #ff00ff); } }

        /* Sections */
        section { padding: 80px 0; scroll-margin-top: 80px; }
        .section-title {
            font-family: 'Orbitron', monospace; font-size: clamp(24px, 6vw, 36px);
            text-align: center; margin-bottom: 50px; background: linear-gradient(45deg, #00f5ff, #ff00ff);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        /* News Cards */
        .skills-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .skill-card {
            background: rgba(255,255,255,0.05); padding: 20px; border-radius: 20px;
            border: 1px solid rgba(0,245,255,0.2); transition: 0.3s;
        }
        .skill-card:hover { transform: translateY(-10px); border-color: #ff00ff; }
        .skill-card img { width: 100%; border-radius: 10px; margin-bottom: 15px; }

        /* Contact Buttons */
        .contact-box { text-align: center; background: rgba(255,255,255,0.05); padding: 40px; border-radius: 30px; border: 1px solid #00f5ff; }
        .cta-btn {
            background: linear-gradient(45deg, #00f5ff, #ff00ff); color: #000;
            padding: 15px 30px; border-radius: 50px; text-decoration: none; font-weight: bold;
            display: inline-block; margin: 10px; transition: 0.3s;
        }
        .cta-btn.ig { background: #E4405F; color: #fff; }

        /* Social Matrix */
        .social-matrix {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 15px; padding: 15px; background: rgba(0,0,0,0.8);
            border-radius: 50px; border: 1px solid #00f5ff; z-index: 1000;
        }
        .social-link { width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; text-decoration: none; }
        .wa { background: #25D366; } .ig { background: #E4405F; } .yt { background: #FF0000; }

        /* Scroll Progress */
        .scroll-progress { position: fixed; top: 0; left: 0; height: 4px; background: #00f5ff; z-index: 1001; transition: 0.1s; }
    </style>
</head>
<body>
    <div class="scroll-progress" id="scrollProgress"></div>

    <header>
        <div class="container">
            <div class="logo">Xrex Zob</div>
            <nav>
                <a href="#home" class="nav-btn">Home</a>
                <a href="#coding-news" class="nav-btn">News</a>
                <a href="#contact" class="nav-btn">Contact</a>
            </nav>
        </div>
    </header>

    <section id="home" class="hero">
        <h1>Xrex Zob</h1>
        <p>Creator | Developer | Visionary</p>
        <a href="#contact" class="cta-btn">Hubungi Saya</a>
    </section>

    <section id="coding-news">
        <div class="container">
            <h2 class="section-title">Coding Updates</h2>
            <div id="news-container" class="skills-grid">
                <p style="text-align: center; grid-column: 1/-1;">Sedang menarik data dari satelit...</p>
            </div>
        </div>
    </section>

    <section id="contact">
        <div class="container">
            <div class="contact-box">
                <h2 class="section-title">Let's Connect</h2>
                <p>Gak usah ribet ketik email, langsung klik tombol di bawah buat ngobrol.</p>
                <div style="margin-top: 30px;">
                    <a href="https://instagram.com/xrexzob" target="_blank" class="cta-btn ig"><i class="fab fa-instagram"></i> Instagram</a>
                    <a href="https://wa.me/6281234567890" target="_blank" class="cta-btn"><i class="fab fa-whatsapp"></i> WhatsApp</a>
                </div>
            </div>
        </div>
    </section>

    <div class="social-matrix">
        <a href="https://wa.me/6281234567890" class="social-link wa"><i class="fab fa-whatsapp"></i></a>
        <a href="https://instagram.com/xrexzob" class="social-link ig"><i class="fab fa-instagram"></i></a>
        <a href="#" class="social-link yt"><i class="fab fa-youtube"></i></a>
    </div>

    <script>
        // Ambil berita coding otomatis (API GRATIS & TANPA DAFTAR)
        async function fetchNews() {
            const container = document.getElementById('news-container');
            try {
                const response = await fetch('https://dev.to/api/articles?tag=programming&per_page=3');
                const articles = await response.json();
                container.innerHTML = '';
                articles.forEach(art => {
                    container.innerHTML += `
                        <div class="skill-card">
                            <img src="${art.social_image}" alt="news">
                            <h3>${art.title}</h3>
                            <p style="font-size:13px; margin: 10px 0; opacity:0.8;">${art.description.substring(0, 80)}...</p>
                            <a href="${art.url}" target="_blank" style="color:#00f5ff; text-decoration:none; font-weight:bold;">Baca Artikel →</a>
                        </div>
                    `;
                });
            } catch (err) {
                container.innerHTML = '<p>Gagal memuat berita otomatis.</p>';
            }
        }

        window.onscroll = () => {
            let winScroll = document.body.scrollTop || document.documentElement.scrollTop;
            let height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            document.getElementById("scrollProgress").style.width = (winScroll / height) * 100 + "%";
        };

        window.onload = fetchNews;
    </script>
</body>
</html>
