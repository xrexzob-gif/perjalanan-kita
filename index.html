<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRIVATE_AI_SYSTEM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');
        body { background: #050505; color: #fff; font-family: 'Inter', sans-serif; height: 100vh; display: flex; flex-direction: column; }
        .chat-container { flex: 1; overflow-y: auto; padding: 20px; scroll-behavior: smooth; }
        .bubble { max-width: 85%; padding: 12px 16px; border-radius: 18px; font-size: 14px; line-height: 1.5; margin-bottom: 15px; }
        .ai-bubble { background: #1a1a1a; color: #ccc; border-bottom-left-radius: 4px; border: 1px solid #333; }
        .user-bubble { background: #2563eb; color: #fff; margin-left: auto; border-bottom-right-radius: 4px; }
        .input-area { background: #000; border-top: 1px solid #222; padding: 15px; }
        .loading { display: inline-block; width: 20px; height: 20px; border: 3px solid rgba(255,255,255,.3); border-radius: 50%; border-top-color: #fff; animation: spin 1s ease-in-out infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="p-4 border-b border-zinc-800 flex justify-between items-center bg-zinc-950">
        <div>
            <h1 class="text-xs font-bold tracking-[3px] uppercase text-blue-500">Gemini Core 1.5</h1>
            <p class="text-[9px] text-zinc-500 mt-1 uppercase">Connection: Encrypted</p>
        </div>
        <div class="h-2 w-2 bg-green-500 rounded-full shadow-[0_0_10px_#22c55e]"></div>
    </div>

    <div id="display" class="chat-container">
        <div class="bubble ai-bubble">Sistem aktif, Bos. Mau nanya apa hari ini?</div>
    </div>

    <div class="input-area">
        <div class="max-w-2xl mx-auto flex gap-2 items-center bg-zinc-900 p-2 rounded-2xl border border-zinc-800">
            <input type="text" id="input" placeholder="Tanya sesuatu..." 
                   class="bg-transparent flex-1 outline-none px-3 py-2 text-sm"
                   onkeypress="if(event.key === 'Enter') gasTanya()">
            <button onclick="gasTanya()" id="btn" class="bg-blue-600 p-2 rounded-xl active:scale-95 transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </div>
    </div>

    <script type="module">
        import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

        // API Key lo udah gue pasang di sini, Bos.
        const API_KEY = "AIzaSyBHYSpYpUGPU-YQuPCu_Fvkjc_Qiba9nOc"; 
        const genAI = new GoogleGenerativeAI(API_KEY);
        
        // Setting kepribadian AI
        const model = genAI.getGenerativeModel({ 
            model: "gemini-1.5-flash",
            systemInstruction: "Panggil user dengan sebutan 'Bos'. Gaya bicara santai, gaul, to-the-point, dan sedikit blak-blakan. Jangan pake bahasa kaku kayak buku sekolah."
        });

        window.gasTanya = async () => {
            const input = document.getElementById('input');
            const display = document.getElementById('display');
            const btn = document.getElementById('btn');
            const pesan = input.value.trim();

            if (!pesan) return;

            // Masukin chat User
            display.innerHTML += `<div class="bubble user-bubble">${pesan}</div>`;
            input.value = '';
            display.scrollTop = display.scrollHeight;

            // Efek Loading
            btn.innerHTML = `<div class="loading"></div>`;
            btn.disabled = true;

            try {
                const result = await model.generateContent(pesan);
                const response = await result.response;
                const text = response.text();

                // Masukin jawaban AI
                display.innerHTML += `<div class="bubble ai-bubble">${text}</div>`;
                display.scrollTop = display.scrollHeight;
            } catch (err) {
                display.innerHTML += `<div class="text-[10px] text-red-500 italic text-center p-4">Sistem Error: Cek API Key atau Kuota!</div>`;
            } finally {
                btn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>`;
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
