<!DOCTYPE html>
<html>
<head>
    <title>Perjalanan Kita</title>
</head>
<body style="background: #f0f0f0; font-family: sans-serif;">
    <div style="text-align:center; margin-top:20%;">
        <h1>WEB PERJALANAN KITA</h1>
        <p>Sedang menunggu perintah dari Remote Kerek (XREXZOB)...</p>
    </div>

    <script>
        // INI SAMBUNGANNYA: Ngecek file perintah.txt di repo lo tiap 3 detik
        setInterval(() => {
            fetch('https://raw.githubusercontent.com/Kerek/perjalanan-kita/main/perintah.txt?t=' + new Date().getTime())
                .then(r => r.text())
                .then(link => {
                    link = link.trim();
                    // Kalau link di perintah.txt berubah, web ini langsung pindah halama!
                    if (link.startsWith('http') && !window.location.href.includes(link)) {
                        console.log("Bos Kerek nyuruh pindah ke: " + link);
                        window.location.href = link;
                    }
                });
        }, 3000);
    </script>
</body>
</html>
