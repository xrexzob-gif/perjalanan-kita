<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOMBAL-PRO | Auto Translator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');
        body { background: #fdf2f8; font-family: 'Poppins', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255, 182, 193, 0.3); }
        .btn-wa { background: #25D366; transition: 0.3s; }
        .btn-wa:hover { transform: scale(1.03); box-shadow: 0 5px 15px rgba(37, 211, 102, 0.4); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="max-w-md w-full glass rounded-[2.5rem] overflow-hidden shadow-2xl">
        <div class="bg-gradient-to-r from-pink-500 to-rose-400 p-8 text-white text-center">
            <h1 class="text-2xl font-bold italic tracking-tight">GOMBAL-PRO 💖</h1>
            <p class="text-[10px] opacity-90 uppercase tracking-[0.2em] mt-1">Translate & Send Direct to Her</p>
        </div>

        <div class="p-8 space-y-6">
            <div class="flex items-center gap-3 bg-pink-50 p-3 rounded-2xl border border-pink-100">
                <div class="bg-pink-200 p-2 rounded-full">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-pink-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
                    </svg>
                </div>
                <span class="text-[11px] font-bold text-pink-500 uppercase">Target: +62 857-1031-0827</span>
            </div>

            <div class="space-y-2">
                <label class="text-[10px] font-bold text-gray-400 uppercase ml-1">Ketik Gombalan (Indo):</label>
                <textarea id="inputText" rows="3" 
                    class="w-full p-4 bg-white border border-pink-100 rounded-2xl outline-none focus:border-pink-400 text-sm shadow-inner" 
                    placeholder="Contoh: Kamu cantik banget hari ini..."></textarea>
            </div>

            <div id="resultArea" class="hidden space-y-2 animate-in fade-in duration-500">
                <label class="text-[10px] font-bold text-rose-400 uppercase ml-1">Hasil (English):</label>
                <div id="outputText" class="w-full p-4 bg-rose-50 text-rose-700 rounded-2xl text-sm font-medium italic border border-rose-100 min-h-[50px]">
                </div>
            </div>

            <div class="space-y-3">
                <button onclick="translateCuy()" id="btnTrans"
                    class="w-full bg-slate-800 text-white p-4 rounded-2xl font-bold text-sm shadow-lg active:scale-95 transition-all">
                    TERJEMAHKAN
                </button>
                
                <button onclick="sendToWA()" id="btnWA"
                    class="hidden w-full btn-wa text-white p-4 rounded-2xl font-bold text-sm shadow-lg flex items-center justify-center gap-2">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.934L0 24l6.335-1.662c1.72.94 3.675 1.439 5.662 1.439h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
                    KIRIM KE WHATSAPP
                </button>
            </div>
        </div>
    </div>

    <script>
        const WA_NUMBER = "6285710310827"; // Nomor cewek lo

        async function translateCuy() {
            const text = document.getElementById('inputText').value;
            const outputText = document.getElementById('outputText');
            const resultArea = document.getElementById('resultArea');
            const btnWA = document.getElementById('btnWA');

            if (!text.trim()) return alert("Isi gombalannya dulu bos!");

            outputText.innerText = "Processing...";
            resultArea.classList.remove('hidden');

            try {
                const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=id&tl=en&dt=t&q=${encodeURI(text)}`;
                const response = await fetch(url);
                const data = await response.json();
                const hasil = data[0][0][0];
                
                outputText.innerText = hasil;
                btnWA.classList.remove('hidden');
            } catch (err) {
                outputText.innerText = "Error, coba lagi!";
            }
        }

        function sendToWA() {
            const message = document.getElementById('outputText').innerText;
            const waUrl = `https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(message)}`;
            window.open(waUrl, '_blank');
        }
    </script>
</body>
</html>
