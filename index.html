<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xrex Zob - Media</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Roboto', sans-serif;
            background: #050505;
            color: #fff;
            overflow-x: hidden;
        }
        .container { max-width: 1200px; padding: 0 20px; margin: 0 auto; }

        /* Header */
        header {
            position: fixed; top: 0; width: 100%; background: rgba(0,0,0,0.9);
            backdrop-filter: blur(15px); z-index: 1000; padding: 15px 0;
            border-bottom: 1px solid #00f5ff55;
        }
        .logo {
            font-family: 'Orbitron', sans-serif; font-size: 24px; font-weight: 900;
            background: linear-gradient(45deg, #00f5ff, #ff00ff);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-align: center;
        }

        /* News Section */
        section { padding: 100px 0 50px; }
        .section-title {
            font-family: 'Orbitron', sans-serif; font-size: 32px;
            text-align: center; margin-bottom: 40px; color: #00f5ff;
            text-transform: uppercase; letter-spacing: 5px;
        }

        /* Grid Berita */
        #news-container { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
            gap: 25px; 
        }

        .news-card {
            background: #111;
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid #222;
            transition: all 0.4s ease;
            display: flex;
            flex-direction: column;
        }

        .news-card:hover {
            transform: translateY(-10px);
            border-color: #ff00ff;
            box-shadow: 0 10px 30px rgba(255, 0, 255, 0.2);
        }

        .news-card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-bottom: 2px solid #00f5ff;
        }

        .news-content { padding: 20px; flex-grow: 1; }
        .news-content h3 { font-size: 18px; margin-bottom: 10px; color: #fff; line-height: 1.4; }
        .news-content p { font-size: 14px; color: #aaa; margin-bottom: 20px; line-height: 1.6; }

        .read-more {
            display: inline-block;
            color: #00f5ff;
            text-decoration: none;
            font-weight: bold;
            font-size: 13px;
            border: 1px solid #00f5ff;
            padding: 8px 15px;
            border-radius: 5px;
            transition: 0.3s;
        }

        .read-more:hover { background: #00f5ff; color: #000; }

        /* Button Tambah Berita */
        .load-more-container { text-align: center; margin-top: 50px; }
        #load-more-btn {
            background: linear-gradient(45deg, #ff00ff, #00f5ff);
            border: none; padding: 15px 40px; border-radius: 50px;
            color: #000; font-weight: 900; font-family: 'Orbitron';
            cursor: pointer; transition: 0.3s;
        }
        #load-more-btn:hover { transform: scale(1.1); box-shadow: 0 0 20px #00f5ff; }

        /* Social Fixed */
        .social-matrix {
            position: fixed; bottom: 20px; right: 20px;
            display: flex; flex-direction: column; gap: 10px; z-index: 1000;
        }
        .social-link {
            width: 50px; height: 50px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: #fff; text-decoration: none; font-size: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        .wa { background: #25D366; } .ig { background: #E4405F; }

        /* Loading */
        #loading-text { text-align: center; color: #00f5ff; font-family: 'Orbitron'; margin-top: 20px; }
    </style>
</head>
<body>

    <header>
        <div class="container">
            <div class="logo">XREX ZOB MEDIA</div>
        </div>
    </header>

    <section>
        <div class="container">
            <h2 class="section-title">Latest Coding News</h2>
            <div id="news-container">
                </div>
            
            <div id="loading-text" style="display:none;">CONNECTING TO SATELLITE...</div>

            <div class="load-more-container">
                <button id="load-more-btn">LOAD MORE NEWS</button>
            </div>
        </div>
    </section>

    <div class="social-matrix">
        <a href="https://wa.me/6281234567890" class="social-link wa"><i class="fab fa-whatsapp"></i></a>
        <a href="https://instagram.com/xrexzob" class="social-link ig"><i class="fab fa-instagram"></i></a>
    </div>

    <script>
        let currentPage = 1;
        const newsContainer = document.getElementById('news-container');
        const loadMoreBtn = document.getElementById('load-more-btn');
        const loadingText = document.getElementById('loading-text');

        async function fetchNews(page) {
            loadingText.style.display = 'block';
            try {
                // Kita tarik 12 berita per klik
                const response = await fetch(`https://dev.to/api/articles?tag=programming&per_page=12&page=${page}`);
                const data = await response.json();
                
                if(data.length > 0) {
                    data.forEach(item => {
                        const card = `
                            <div class="news-card">
                                <img src="${item.social_image || 'https://via.placeholder.com/400x200'}" alt="img">
                                <div class="news-content">
                                    <h3>${item.title}</h3>
                                    <p>${item.description.substring(0, 100)}...</p>
                                    <a href="${item.url}" target="_blank" class="read-more">READ MORE</a>
                                </div>
                            </div>
                        `;
                        newsContainer.innerHTML += card;
                    });
                } else {
                    loadMoreBtn.style.display = 'none';
                }
            } catch (error) {
                console.error("Gagal narik data");
            }
            loadingText.style.display = 'none';
        }

        // Load awal
        fetchNews(currentPage);

        // Fungsi Load More
        loadMoreBtn.addEventListener('click', () => {
            currentPage++;
            fetchNews(currentPage);
        });
    </script>

</body>
</html>
