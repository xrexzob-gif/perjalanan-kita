<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S_YSTEM OVERRIDE | ERROR 404</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; overflow: hidden; }
        .blink { animation: blink 0.1s infinite; }
        @keyframes blink { 0%, 100% { background: #f00; color: #fff; } 50% { background: #000; color: #0f0; } }
        #scareContent { display: none; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-6">

    <div id="welcomeContent" class="text-center p-8 bg-black border-2 border-green-900 rounded-xl shadow-2xl">
        <h1 class="text-3xl font-black mb-4 tracking-tighter italic text-green-500">SYSTEM.ACCESS</h1>
        <p class="text-[10px] text-green-800 uppercase italic mb-8">Click button below to open secure tunnel</p>
        <button onclick="startScare()" class="px-8 py-4 bg-green-900/30 border-2 border-green-500 text-green-400 font-bold text-sm rounded-xl hover:bg-green-500 hover:text-black transition uppercase shadow-lg shadow-green-500/20">
            [ CONNECT TO SERVER ]
        </button>
    </div>

    <div id="scareContent" class="fixed inset-0 z-50 flex flex-col items-center justify-center p-6 blink">
        <h1 class="text-[50px] font-black tracking-tighter mb-4">SYSTEM BREACHED!</h1>
        <p class="text-2xl font-bold mb-8">WARNING: CUMULATIVE_ERROR_0xDEADBEEF</p>
        
        <div class="p-6 bg-black border-4 border-white rounded-2xl text-center">
            <h3 class="text-4xl font-bold mb-4">LOGGING_OFF...</h3>
            <p class="text-sm opacity-70 uppercase tracking-widest">Unauthorized Access Detected. System will self-destruct.</p>
        </div>
        
        <div class="mt-10 text-[10px] uppercase tracking-[0.5em] text-white">#GetPrankedByAnjing#</div>
    </div>

    <script>
        function startScare() {
            // Sembunyiin tombol, tampilin konten jebakan
            document.getElementById('welcomeContent').style.display = 'none';
            const scare = document.getElementById('scareContent');
            scare.style.display = 'flex';

            // Mainin Suara (Gue pake Sirene Nuklir biar panik)
            const audio = new Audio('https://github.com/SiAsep/perjalanan-kita/raw/main/nuke_siren.mp3'); 
            // Kalau file suaranya belum ada di GitHub, suaranya gak bunyi. 
            // Jadi kalau lo mau, upload file .mp3 lo ke GitHub dulu, ganti linknya.
            // Atau lo pake suara bawaan browser aja yang 'annoying':
            const altAudio = new Audio('https://www.soundjay.com/buttons/beep-01a.mp3');
            
            // Coba mainin suara (pake loop biar pusing)
            altAudio.loop = true;
            altAudio.play().catch(e => alert("Woy, klik browsernya biar suaranya bunyi! (Browser blokir auto-play)"));
        }
    </script>
</body>
</html>
